name: SBOM

# Generates CycloneDX + SPDX SBOMs via Syft on every release.
# Also available for manual runs (workflow_dispatch) for ad-hoc audits.
#
# plan-0069 Phase 2 — SOUP SBOM baseline
# Artifacts uploaded to GitHub Actions and attached to the release.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # required to attach files to release assets

jobs:
  generate-sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # ── CycloneDX ──────────────────────────────────────────────────────────
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: claude-statusline-rs-${{ steps.ver.outputs.tag }}-cyclonedx.json
          artifact-name: claude-statusline-rs-${{ steps.ver.outputs.tag }}-cyclonedx.json
          upload-release-assets: true

      # ── SPDX ───────────────────────────────────────────────────────────────
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: claude-statusline-rs-${{ steps.ver.outputs.tag }}-spdx.json
          artifact-name: claude-statusline-rs-${{ steps.ver.outputs.tag }}-spdx.json
          upload-release-assets: true
